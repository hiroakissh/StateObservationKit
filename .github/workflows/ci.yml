name: CI

on:
  push:
    branches:
      - develop
      - feature/release-*
  pull_request:
    branches:
      - develop
      - main
      - feature/release-*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate VERSION metadata
        run: ./scripts/release_version.sh validate

      - name: Require develop as the main release source
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "::error::Pull requests into main must come from develop."
            exit 1
          fi

      - name: Validate release branch version alignment
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/release-')
        run: ./scripts/release_version.sh match-branch "${{ github.head_ref }}"

      - name: Validate release branch version alignment on push
        if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/release-')
        run: ./scripts/release_version.sh match-branch "${{ github.ref_name }}"

  swiftpm:
    name: SwiftPM Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run SwiftPM validation
        run: make test-spm

  xcode:
    name: Xcode Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run Xcode validation
        run: make test-xcode

  examples:
    name: Example Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build example targets when present
        run: make build-examples
