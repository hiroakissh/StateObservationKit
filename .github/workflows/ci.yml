name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  swiftpm:
    name: SwiftPM Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run SwiftPM validation
        run: make test-spm

  xcode:
    name: Xcode Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run Xcode validation
        run: make test-xcode

  examples:
    name: Example Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build example targets when present
        run: make build-examples
